{% extends "base.html" %}
{% block content %}

<div class="dashboard-container">

    <div class="dashboard-header">
        <h1 class="gradient-text"><i class="fas fa-user"></i> My Profile</h1>
        <p>Update the details FitGenie uses to build your personalized plans.</p>
    </div>

    <div class="dashboard-card glass-panel" style="animation: fadeUp 0.8s ease; margin-bottom: 2rem;">
        <div style="display:flex; align-items:center; gap:16px; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border);">
            <div class="sidebar-avatar" style="width:56px; height:56px; font-size:1.4rem;">{{ current_user.username[0]|upper }}</div>
            <div>
                <h2 style="font-size: 1.2rem; margin-bottom: 2px;">{{ current_user.username }}</h2>
                <p style="color: var(--text-muted); font-size: 0.85rem;">{{ current_user.email }}</p>
            </div>
        </div>

        <form method="POST" action="{{ url_for('meal.profile') }}">
            <div class="form-grid">

                <div class="form-group">
                    <label><i class="fas fa-calendar-day"></i> Age</label>
                    <input type="number" name="age" placeholder="Age" min="10" max="100" value="{{ current_user.age or '' }}">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-venus-mars"></i> Gender</label>
                    <select name="gender">
                        <option value="">Select Gender</option>
                        <option {% if current_user.gender == 'Male' %}selected{% endif %}>Male</option>
                        <option {% if current_user.gender == 'Female' %}selected{% endif %}>Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-ruler-vertical"></i> Height (cm)</label>
                    <input type="number" name="height" placeholder="e.g. 175" min="100" max="250" value="{{ current_user.height or '' }}">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-weight-hanging"></i> Weight (kg)</label>
                    <input type="number" name="weight" placeholder="e.g. 70" min="30" max="300" value="{{ current_user.weight or '' }}">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-bullseye"></i> Primary Goal</label>
                    <select name="goal">
                        <option value="">Choose your objective</option>
                        <option value="lose" {% if current_user.goal == 'lose' %}selected{% endif %}>Lose Weight</option>
                        <option value="gain" {% if current_user.goal == 'gain' %}selected{% endif %}>Gain Muscle</option>
                        <option value="maintain" {% if current_user.goal == 'maintain' %}selected{% endif %}>Maintain Fitness</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-leaf"></i> Dietary Preference</label>
                    <select name="diet">
                        <option value="">Select Diet</option>
                        <option value="vegetarian" {% if current_user.diet == 'vegetarian' %}selected{% endif %}>Vegetarian</option>
                        <option value="non-vegetarian" {% if current_user.diet == 'non-vegetarian' %}selected{% endif %}>Non-Vegetarian</option>
                        <option value="vegan" {% if current_user.diet == 'vegan' %}selected{% endif %}>Vegan</option>
                        <option value="keto" {% if current_user.diet == 'keto' %}selected{% endif %}>Keto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-bolt-lightning"></i> Daily Activity</label>
                    <select name="activity">
                        <option value="">How active are you?</option>
                        <option value="sedentary" {% if current_user.activity == 'sedentary' %}selected{% endif %}>Sedentary (Office/Desk job)</option>
                        <option value="light" {% if current_user.activity == 'light' %}selected{% endif %}>Lightly Active (Light exercise)</option>
                        <option value="moderate" {% if current_user.activity == 'moderate' %}selected{% endif %}>Moderately Active (3-5 days/week)</option>
                        <option value="very active" {% if current_user.activity == 'very active' %}selected{% endif %}>Very Active (6-7 days/week)</option>
                        <option value="extra active" {% if current_user.activity == 'extra active' %}selected{% endif %}>Elite Athlete</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-globe-asia"></i> Preferred Cuisine</label>
                    <select name="cuisine">
                        <option value="Standard" {% if current_user.cuisine == 'Standard' %}selected{% endif %}>Global / Standard</option>
                        <option value="Indian" {% if current_user.cuisine == 'Indian' %}selected{% endif %}>Indian Authentic</option>
                        <option value="Mediterranean" {% if current_user.cuisine == 'Mediterranean' %}selected{% endif %}>Mediterranean</option>
                        <option value="Asian" {% if current_user.cuisine == 'Asian' %}selected{% endif %}>Asian Fusion</option>
                    </select>
                </div>

            </div>

            <div style="border-top: 1px solid var(--glass-border); padding-top: 1.5rem; text-align: center;">
                <button class="primary-btn" type="submit" style="width: auto; min-width: 260px; margin: 0 auto;">
                    <i class="fas fa-floppy-disk"></i> Save Profile
                </button>
            </div>
        </form>
    </div>

</div>

{% endblock %}
